name: Test and Build

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  load-matrix:
    uses: ./.github/workflows/load-matrix.yml
    with:
      file: .github/matrix.json

  test-and-build:
    needs: load-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Common setup
        uses: ./.github/actions/setup-beam
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Run tests
        run: make tests CT_LOGS_DIR=logs current_rmq_ref=${{ matrix.rabbitmq }}

      - name: Upload logs if tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-rabbitmq-${{ matrix.rabbitmq }}
          path: logs/

      - name: Build release artifact
        if: success()
        run: make dist DIST_AS_EZS=1 current_rmq_ref=${{ matrix.rabbitmq }}

      - name: Zip release artifact with RabbitMQ version
        if: success()
        run: zip -rj seventh-state-hello-plugin-rabbitmq-${{ matrix.rabbitmq }}.zip plugins/seventh_state_hello_plugin-*.ez

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: seventh-state-hello-plugin-rabbitmq-${{ matrix.rabbitmq }}
          path: seventh-state-hello-plugin-rabbitmq-${{ matrix.rabbitmq }}.zip
